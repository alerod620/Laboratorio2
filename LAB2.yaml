AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestructura Alta Disponibilidad con 6 servidores NGINX

Parameters:
  KeyName:
    Description: Nombre del KeyPair SSH
    Type: AWS::EC2::KeyPair::KeyName

Resources:

# =====================================================
# VPC
# =====================================================

  LabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LabVPC
      InternetGatewayId: !Ref InternetGateway

# =====================================================
# SUBNETS
# =====================================================

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true

# =====================================================
# ROUTING
# =====================================================

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  Subnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

# =====================================================
# SECURITY GROUP
# =====================================================

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir HTTP y SSH
      VpcId: !Ref LabVPC

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

# =====================================================
# LOAD BALANCER
# =====================================================

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: LabALB
      Scheme: internet-facing
      Type: application

      SecurityGroups:
        - !Ref WebSecurityGroup

      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

# =====================================================
# TARGET GROUP
# =====================================================

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 80
      Protocol: HTTP
      VpcId: !Ref LabVPC
      TargetType: instance

      HealthCheckPath: /
      HealthCheckProtocol: HTTP

# =====================================================
# LISTENER
# =====================================================

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

# =====================================================
# EC2 INSTANCES
# =====================================================

  WebServer1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      ImageId: ami-0c02fb55956c7d316
      SubnetId: !Ref PublicSubnet1

      SecurityGroupIds:
        - !Ref WebSecurityGroup

      Tags:
        - Key: Name
          Value: WebServer1

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash

          yum update -y
          amazon-linux-extras install nginx1 -y

          systemctl start nginx
          systemctl enable nginx

          HOSTNAME=$(hostname)

          cat <<EOF > /usr/share/nginx/html/index.html
          <!DOCTYPE html>
          <html lang="es">

          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AWS High Availability</title>

              <style>

                  *{
                      margin:0;
                      padding:0;
                      box-sizing:border-box;
                      font-family:Arial,sans-serif;
                  }

                  body{
                      background: linear-gradient(135deg,#0f172a,#1e293b,#334155);
                      color:white;
                      height:100vh;
                      display:flex;
                      justify-content:center;
                      align-items:center;
                  }

                  .container{
                      width:80%;
                      max-width:700px;
                      background:rgba(255,255,255,0.08);
                      padding:50px;
                      border-radius:20px;
                      text-align:center;
                      backdrop-filter:blur(10px);
                      box-shadow:0 0 30px rgba(0,0,0,0.5);
                  }

                  h1{
                      font-size:3rem;
                      color:#38bdf8;
                      margin-bottom:20px;
                  }

                  h2{
                      color:#f8fafc;
                      margin-bottom:20px;
                  }

                  p{
                      color:#cbd5e1;
                      line-height:1.7;
                      margin-bottom:20px;
                  }

                  .badge{
                      display:inline-block;
                      padding:12px 25px;
                      background:#22c55e;
                      border-radius:999px;
                      font-weight:bold;
                      animation:pulse 2s infinite;
                  }

                  @keyframes pulse{
                      0%{
                          transform:scale(1);
                      }

                      50%{
                          transform:scale(1.05);
                      }

                      100%{
                          transform:scale(1);
                      }
                  }

                  .server{
                      margin-top:30px;
                      font-size:1.2rem;
                      color:#facc15;
                  }

              </style>
          </head>

          <body>

              <div class="container">

                  <h1>AWS High Availability</h1>

                  <h2>NGINX + EC2 + Load Balancer</h2>

                  <p>
                      Infraestructura desplegada automáticamente utilizando
                      AWS CloudFormation y múltiples instancias EC2.
                  </p>

                  <div class="badge">
                      Servidor funcionando correctamente
                  </div>

                  <div class="server">
                      Instancia activa: $HOSTNAME
                  </div>

              </div>

          </body>

          </html>
          EOF

