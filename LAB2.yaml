AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infraestructura en Alta Disponibilidad con NGINX usando AWS CloudFormation.
  Despliega 2 instancias EC2 en diferentes zonas de disponibilidad
  con un Application Load Balancer.

Parameters:

    KeyName: ClaveLaboratorio1
    Description: Nombre del KeyPair SSH existente
    Type: AWS::EC2::KeyPair::KeyName

Resources:

# -----------------------------
# VPC
# -----------------------------

  LabVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: LabVPC

# -----------------------------
# Internet Gateway
# -----------------------------

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: LabIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref LabVPC
      InternetGatewayId: !Ref InternetGateway

# -----------------------------
# Public Subnets
# -----------------------------

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref LabVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: PublicSubnet2

# -----------------------------
# Route Table
# -----------------------------

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref LabVPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  Subnet1RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet1

  Subnet2RouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet2

# -----------------------------
# Security Group
# -----------------------------

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir HTTP y SSH
      VpcId: !Ref LabVPC

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

# -----------------------------
# EC2 Instance 1
# -----------------------------

  WebServer1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName

      ImageId: ami-0c02fb55956c7d316

      SubnetId: !Ref PublicSubnet1

      SecurityGroupIds:
        - !Ref WebSecurityGroup

      Tags:
        - Key: Name
          Value: WebServer1

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          amazon-linux-extras install nginx1 -y
          systemctl start nginx
          systemctl enable nginx

          echo "<h1>Servidor 1 funcionando</h1>" > /usr/share/nginx/html/index.html

# -----------------------------
# EC2 Instance 2
# -----------------------------

  WebServer2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: !Ref KeyName

      ImageId: ami-0c02fb55956c7d316

      SubnetId: !Ref PublicSubnet2

      SecurityGroupIds:
        - !Ref WebSecurityGroup

      Tags:
        - Key: Name
          Value: WebServer2

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          amazon-linux-extras install nginx1 -y
          systemctl start nginx
          systemctl enable nginx

          echo "<h1>Servidor 2 funcionando</h1>" > /usr/share/nginx/html/index.html

# -----------------------------
# Load Balancer
# -----------------------------

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: LabALB
      Scheme: internet-facing
      Type: application

      SecurityGroups:
        - !Ref WebSecurityGroup

      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

# -----------------------------
# Target Group
# -----------------------------

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: LabTargetGroup
      Port: 80
      Protocol: HTTP
      VpcId: !Ref LabVPC
      TargetType: instance

      Targets:
        - Id: !Ref WebServer1
        - Id: !Ref WebServer2

      HealthCheckPath: /
      HealthCheckProtocol: HTTP

# -----------------------------
# Listener
# -----------------------------

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

# -----------------------------
# Outputs
# -----------------------------

Outputs:

  LoadBalancerDNS:
    Description: DNS del Load Balancer
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  Instance1PublicIP:
    Description: IP pública de la instancia 1
    Value: !GetAtt WebServer1.PublicIp

  Instance2PublicIP:
    Description: IP pública de la instancia 2
    Value: !GetAtt WebServer2.PublicIp